# ── 基本信息 ──────────────────────────────────────
site_name: 我的笔记
site_description: 记录学习路上的思考与发现
site_author: Your Name

# ── 仓库（发布到 GitHub 后取消注释）────────────────
# repo_name: username/my-notes
# repo_url: https://github.com/username/my-notes

copyright: 'Copyright &copy; 2026 - Your Name'

# ── 主题 ──────────────────────────────────────────
theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  favicon: assets/favicon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
  features:
    - navigation.tracking       # URL 锚点跟踪
    - navigation.tabs           # 顶部导航栏
    - navigation.tabs.sticky    # 导航栏固定
    - navigation.sections       # 侧边栏分组
    - navigation.expand         # 侧边栏展开
    - navigation.top            # 一键回顶部
    - navigation.footer         # 底部翻页
    - content.code.copy         # 代码一键复制
    - content.code.annotate     # 代码行注释
    - search.highlight          # 搜索结果高亮
    - search.suggest            # 搜索自动补全
    - toc.follow                # 右侧目录跟随滚动

# ── 插件 ──────────────────────────────────────────
plugins:
  - search:
      separator: '[\s\-]'

# ── Markdown 扩展 ──────────────────────────────────
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

# ── 样式 ──────────────────────────────────────────
extra_css:
  - stylesheets/extra.css

# ── 导航 ──────────────────────────────────────────
nav:
  - 首页: index.md
  - 自然与旅行:
    - 概览: note1/index.md
    - 山间晨雾: note1/page1.md
    - 樱花季: note1/page2.md
    - 海边黄昏: note1/page3.md
  - 关于本站: note2.md
  - 使用说明: guide.md
